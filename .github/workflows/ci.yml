name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, mysql, gd
      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist
      - name: Create .env
        run: cp .env.example .env 2>/dev/null || echo "APP_KEY=base64:test" > .env
      - name: Generate Key
        run: php artisan key:generate
      - name: Run Pint (Laravel Style)
        run: vendor/bin/pint --test -v 2>&1 || true

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: tlab_test
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo, mysql, gd
      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist
      - name: Create .env.testing
        run: |
          echo "APP_ENV=testing" > .env.testing
          echo "APP_KEY=" >> .env.testing
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=tlab_test" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          echo "DB_PASSWORD=password" >> .env.testing
      - name: Generate Key
        run: php artisan key:generate --env=testing
      - name: Run Migrations
        run: php artisan migrate --env=testing --force
      - name: Run Tests
        run: php artisan test --env=testing

  # deploy-staging and deploy-production are disabled until you're ready.
  # Uncomment when you want to enable auto-deploy on push to develop/main.
